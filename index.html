<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kế Hoạch Học Tập Hàng Ngày</title>
    <style>
        :root {
            --primary: #2563eb;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f8fafc;
            color: #1e2937;
            line-height: 1.6;
        }
        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 20px;
        }
        header {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        h1 {
            color: var(--primary);
            font-size: 28px;
        }
        .summary {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }
        .card {
            background: white;
            padding: 16px 24px;
            border-radius: 10px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.08);
            flex: 1;
        }
        .unfinished-count {
            font-size: 32px;
            font-weight: bold;
            color: #ef4444;
        }
        .btn {
            padding: 10px 16px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 15px;
            transition: all 0.2s;
        }
        .btn:hover {
            background: #1d4ed8;
            transform: translateY(-2px);
        }
        .btn-secondary {
            background: #64748b;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        th, td {
            padding: 14px 12px;
            text-align: left;
            border-bottom: 1px solid #e2e8f0;
        }
        th {
            background: #f1f5f9;
            font-weight: 600;
            color: #334155;
        }
        tr:hover {
            background: #f8fafc;
        }
        select {
            padding: 6px 10px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 14px;
        }
        .status-not-started { color: #64748b; }
        .status-in-progress { color: #f59e0b; }
        .status-done { color: #10b981; font-weight: 500; }
        
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-content {
            background: white;
            padding: 28px;
            border-radius: 12px;
            width: 100%;
            max-width: 480px;
        }
        input, textarea {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
        }
        .task-list {
            margin-top: 30px;
        }
        .day-header {
            background: #f1f5f9;
            padding: 10px 16px;
            font-weight: 600;
            margin-top: 20px;
            border-radius: 8px 8px 0 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📅 Kế Hoạch Học Tập</h1>
            <div>
                <button class="btn" onclick="showAddModal()">+ Thêm Kế Hoạch</button>
                <button class="btn btn-secondary" onclick="clearAllData()" style="margin-left: 10px;">Xóa Tất Cả</button>
            </div>
        </header>

        <div class="summary">
            <div class="card">
                <div style="font-size: 15px; color: #64748b;">Chưa hoàn thành</div>
                <div id="unfinishedCount" class="unfinished-count">0</div>
            </div>
            <div class="card">
                <div style="font-size: 15px; color: #64748b;">Tổng kế hoạch</div>
                <div id="totalCount" style="font-size: 32px; font-weight: bold;">0</div>
            </div>
        </div>

        <!-- Danh sách kế hoạch chưa hoàn thành -->
        <div class="card" style="margin-bottom: 25px;">
            <h3 style="margin-bottom: 12px; color: #ef4444;">📋 Kế hoạch chưa hoàn thành (gần nhất → xa nhất)</h3>
            <div id="unfinishedList" style="max-height: 300px; overflow-y: auto;"></div>
        </div>

        <!-- Danh sách tất cả theo ngày (gần nhất → xa nhất) -->
        <div class="task-list">
            <h2 style="margin-bottom: 15px;">📆 Tất cả kế hoạch</h2>
            <div id="allPlans"></div>
        </div>
    </div>

    <!-- Modal thêm kế hoạch -->
    <div id="addModal" class="modal">
        <div class="modal-content">
            <h3>Thêm Kế Hoạch Mới</h3>
            <label>Ngày:</label>
            <input type="date" id="planDate" required>
            
            <label style="margin-top: 10px; display: block;">Kế hoạch / Mục tiêu:</label>
            <textarea id="planDesc" rows="3" placeholder="Ví dụ: Học Toán chương 5"></textarea>
            
            <label style="margin-top: 10px; display: block;">Khoảng thời gian:</label>
            <input type="text" id="planTime" placeholder="08:00 - 09:30">
            
            <div style="margin-top: 20px; display: flex; gap: 10px;">
                <button class="btn" onclick="addPlan()">Lưu Kế Hoạch</button>
                <button class="btn btn-secondary" onclick="hideModal()">Hủy</button>
            </div>
        </div>
    </div>

    <script>
        let plans = JSON.parse(localStorage.getItem('studyPlans')) || [];

        function savePlans() {
            localStorage.setItem('studyPlans', JSON.stringify(plans));
            renderAll();
        }

        function formatDate(dateStr) {
            const date = new Date(dateStr);
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            return date.toLocaleDateString('vi-VN', options);
        }

        function getStatusClass(status) {
            if (status === 'done') return 'status-done';
            if (status === 'in-progress') return 'status-in-progress';
            return 'status-not-started';
        }

        function getStatusText(status) {
            if (status === 'done') return '✓ Đã hoàn thành';
            if (status === 'in-progress') return '⟳ Đang làm';
            return '○ Chưa bắt đầu';
        }

        function renderAll() {
            // Sắp xếp theo ngày giảm dần (gần nhất trước)
            plans.sort((a, b) => new Date(b.date) - new Date(a.date));

            // Tổng hợp
            const total = plans.length;
            const unfinished = plans.filter(p => p.status !== 'done');
            document.getElementById('totalCount').textContent = total;
            document.getElementById('unfinishedCount').textContent = unfinished.length;

            // Danh sách chưa hoàn thành (gần nhất → xa nhất)
            const unfinishedHTML = unfinished.length === 0 
                ? '<p style="color: #10b981; font-style: italic;">Tuyệt vời! Bạn đã hoàn thành tất cả.</p>'
                : unfinished.map(plan => `
                    <div style="padding: 12px; background: #fee2e2; border-radius: 8px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center;">
                        <div>
                            <strong>${formatDate(plan.date)}</strong><br>
                            <span>${plan.description}</span><br>
                            <small style="color: #64748b;">${plan.timeSlot}</small>
                        </div>
                        <button onclick="markDone(${plan.id})" class="btn" style="padding: 6px 12px; font-size: 13px;">Hoàn thành</button>
                    </div>
                `).join('');
            document.getElementById('unfinishedList').innerHTML = unfinishedHTML;

            // Danh sách tất cả theo ngày
            let html = '';
            let currentDate = '';

            plans.forEach(plan => {
                if (plan.date !== currentDate) {
                    currentDate = plan.date;
                    html += `
                        <div class="day-header">
                            ${formatDate(plan.date)}
                        </div>
                    `;
                }
                html += `
                    <div style="display: flex; align-items: center; padding: 14px 16px; background: white; border-bottom: 1px solid #e2e8f0;">
                        <div style="flex: 1;">
                            <div style="font-weight: 500;">${plan.description}</div>
                            <div style="color: #64748b; font-size: 14px;">${plan.timeSlot}</div>
                        </div>
                        <div style="margin-right: 20px;">
                            <select onchange="updateStatus(${plan.id}, this.value)">
                                <option value="not-started" ${plan.status === 'not-started' ? 'selected' : ''}>Chưa bắt đầu</option>
                                <option value="in-progress" ${plan.status === 'in-progress' ? 'selected' : ''}>Đang làm</option>
                                <option value="done" ${plan.status === 'done' ? 'selected' : ''}>Đã hoàn thành</option>
                            </select>
                        </div>
                        <button onclick="deletePlan(${plan.id})" style="background: #ef4444; color: white; border: none; padding: 6px 10px; border-radius: 6px; cursor: pointer;">Xóa</button>
                    </div>
                `;
            });

            if (plans.length === 0) {
                html = '<p style="text-align: center; padding: 40px; color: #64748b;">Chưa có kế hoạch nào. Hãy thêm kế hoạch đầu tiên!</p>';
            }

            document.getElementById('allPlans').innerHTML = html;
        }

        function showAddModal() {
            document.getElementById('addModal').style.display = 'flex';
            // Mặc định ngày hôm nay
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('planDate').value = today;
        }

        function hideModal() {
            document.getElementById('addModal').style.display = 'none';
            document.getElementById('planDesc').value = '';
            document.getElementById('planTime').value = '';
        }

        function addPlan() {
            const date = document.getElementById('planDate').value;
            const desc = document.getElementById('planDesc').value.trim();
            const timeSlot = document.getElementById('planTime').value.trim() || 'Không xác định';

            if (!date || !desc) {
                alert('Vui lòng nhập ngày và nội dung kế hoạch!');
                return;
            }

            const newPlan = {
                id: Date.now(),
                date: date,
                description: desc,
                timeSlot: timeSlot,
                status: 'not-started'
            };

            plans.push(newPlan);
            savePlans();
            hideModal();
        }

        function updateStatus(id, status) {
            const plan = plans.find(p => p.id === id);
            if (plan) {
                plan.status = status;
                savePlans();
            }
        }

        function markDone(id) {
            const plan = plans.find(p => p.id === id);
            if (plan) {
                plan.status = 'done';
                savePlans();
            }
        }

        function deletePlan(id) {
            if (confirm('Bạn có chắc muốn xóa kế hoạch này?')) {
                plans = plans.filter(p => p.id !== id);
                savePlans();
            }
        }

// Đường link lưu trữ đám mây của riêng bạn
const BLOB_URL = "https://jsonblob.com/api/jsonBlob/019eeaa8-89d8-7fa0-8885-547161b95247"; 

// Hàm dùng để LƯU dữ liệu lên mạng khi bạn Thêm/Xóa/Sửa kế hoạch
function savePlans() {
    fetch(BLOB_URL, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(plans)
    })
    .then(response => {
        if(!response.ok) console.error("Lỗi khi đồng bộ dữ liệu lên mạng");
    });
}

// Hàm dùng để XÓA TẤT CẢ dữ liệu
function clearAllData() {
    if (confirm('XÓA TẤT CẢ dữ liệu? Hành động này không thể hoàn tác.')) {
        plans = [];
        savePlans();
        renderAll(); 
    }
}

// TỰ ĐỘNG LẤY DỮ LIỆU TỪ MẠNG VỀ KHI MỞ TRANG WEB
window.onload = function() {
    fetch(BLOB_URL)
        .then(response => response.json())
        .then(data => {
            // Nếu trên mạng có dữ liệu thì lấy, nếu chưa có gì thì để mảng rỗng
            plans = data && data.plans ? data.plans : (Array.isArray(data) ? data : []); 
            renderAll(); 
        })
        .catch(error => {
            console.error("Không thể tải dữ liệu đám mây:", error);
            plans = [];
            renderAll();
        });
};
    </script>
</body>
</html>
